name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1 : Tests automatiques ─────────────────────────────
  test:
    name: Tests automatiques
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip setuptools==69.5.1
          pip install scikit-learn==1.4.0 pandas==2.2.0 numpy==1.26.4 joblib==1.3.2 matplotlib==3.8.3
          pip install fastapi==0.109.2 "uvicorn[standard]==0.27.1" pydantic==2.6.1
          pip install PyYAML==6.0.1 pytest==9.0.2 pytest-cov httpx==0.24.1
      - name: Créer dataset minimal pour les tests
        run: |
          python3 -c "
          import pandas as pd
          import numpy as np
          import os
          os.makedirs('data/raw', exist_ok=True)
          os.makedirs('data/processed', exist_ok=True)
          os.makedirs('models', exist_ok=True)
          os.makedirs('reports', exist_ok=True)
          # Dataset minimal
          n = 1000
          pixels = np.random.uniform(0, 1, (n, 784))
          labels = np.random.randint(0, 10, n)
          cols   = [f'pixel_{i}' for i in range(784)]
          df     = pd.DataFrame(pixels, columns=cols)
          df['target']     = labels
          df['label_name'] = df['target'].astype(str)
          df.to_csv('data/raw/dataset.csv', index=False)
          print('Dataset créé')
          "

      - name: Entraîner modèle minimal pour les tests
        run: |
          python3 -c "
          import pandas as pd
          import numpy as np
          import joblib
          import json
          import os
          from sklearn.ensemble import RandomForestClassifier
          from sklearn.preprocessing import StandardScaler
          from sklearn.pipeline import Pipeline

          df = pd.read_csv('data/raw/dataset.csv')
          if 'label_name' in df.columns:
              df = df.drop(columns=['label_name'])
          X = df.drop(columns=['target']).values
          y = df['target'].values

          model = Pipeline([
              ('scaler', StandardScaler()),
              ('model', RandomForestClassifier(n_estimators=10, random_state=42))
          ])
          model.fit(X, y)

          joblib.dump(model, 'models/model.pkl')
          joblib.dump([f'pixel_{i}' for i in range(784)], 'models/feature_names.pkl')
          joblib.dump({0:'T-shirt',1:'Trouser',2:'Pullover',3:'Dress',4:'Coat',
                      5:'Sandal',6:'Shirt',7:'Sneaker',8:'Bag',9:'Ankle boot'},
                      'models/label_names.pkl')

          ref = pd.DataFrame(X[:100], columns=[f'pixel_{i}' for i in range(784)])
          ref['target'] = y[:100]
          ref.to_csv('data/processed/reference.csv', index=False)

          with open('reports/metrics.json', 'w') as f:
              json.dump({'best_model': 'RandomForest', 'accuracy': 0.85,
                        'f1_weighted': 0.85}, f)

          import matplotlib
          matplotlib.use('Agg')
          import matplotlib.pyplot as plt
          for name in ['confusion_matrix_RandomForest', 'confusion_matrix_MLP_NeuralNet',
                      'models_comparison', 'class_distribution']:
              plt.figure()
              plt.savefig(f'reports/{name}.png')
              plt.close()
          print('Modèle créé')
          "

      - name: Lancer les tests
        run: |
          pytest tests/ -v --tb=short

      - name: Résumé des tests
        if: always()
        run: |
          echo "Tests terminés !"

# ── JOB 2 : Déploiement HuggingFace ───────────────────────
  deploy:
    name: Déploiement HuggingFace
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer huggingface_hub
        run: pip install huggingface_hub

      # --- SECTION GRADIO ---
      - name: Déployer Gradio sur HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python3 -c "
          import os, shutil
          from huggingface_hub import HfApi, login
          login(token=os.environ['HF_TOKEN'])
          api = HfApi()
          username = os.environ['HF_USERNAME']
          
          os.makedirs('/tmp/hf_gradio', exist_ok=True)
          shutil.copy2('hf_space/gradio_app.py', '/tmp/hf_gradio/app.py')
          with open('/tmp/hf_gradio/requirements.txt', 'w') as f:
              f.write('gradio\nrequests\nPillow\nnumpy\nmatplotlib\nscikit-learn\njoblib\n')
          
          with open('/tmp/hf_gradio/README.md', 'w') as f:
              f.write('---\ntitle: Fashion MNIST Gradio\nsdk: gradio\napp_file: app.py\n---\n')

          api.upload_folder(folder_path='/tmp/hf_gradio', repo_id=f'{username}/fashion-mnist-gradio', repo_type='space')
          "

      # --- SECTION STREAMLIT
      - name: Déployer Streamlit sur HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python3 -c "
          import os, shutil
          from huggingface_hub import HfApi, login
          login(token=os.environ['HF_TOKEN'])
          api = HfApi()
          username = os.environ['HF_USERNAME']
          
          os.makedirs('/tmp/hf_streamlit', exist_ok=True)
          shutil.copy2('hf_space/streamlit_hf.py', '/tmp/hf_streamlit/app.py')
          
          with open('/tmp/hf_streamlit/requirements.txt', 'w') as f:
              f.write('streamlit\npandas\nnumpy\nmatplotlib\nrequests\nPillow\n')
          
          with open('/tmp/hf_streamlit/README.md', 'w') as f:
              f.write('---\ntitle: Fashion MNIST Streamlit\nsdk: streamlit\napp_file: app.py\n---\n')

          api.upload_folder(folder_path='/tmp/hf_streamlit', repo_id=f'{username}/fashion-mnist-app', repo_type='space')
          "
      - name: Résumé du déploiement
        run: |
          echo "Déploiement terminé !"
          echo "Gradio : https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/fashion-mnist-gradio"
          echo "Streamlit : https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/fashion-mnist-app"